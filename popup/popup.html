<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Downloader</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="white" aria-hidden="true">
          <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 4h14v-2H5v2z"/>
        </svg>
        <span>Video Downloader</span>
      </div>
      <div class="header-actions">
        <button id="btn-refresh" class="icon-btn" title="Atualizar lista">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
            <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
        <a id="btn-about" href="about.html" target="_blank" class="icon-btn" title="Sobre a extensão" role="button">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- Platform badge (shown when on a supported site) -->
    <div id="platform-badge" class="platform-badge hidden"></div>

    <!-- URL Input (shown for Twitter or when no platform detected) -->
    <div id="url-section" class="url-section">
      <label class="label" for="tweet-url">URL do post com vídeo</label>
      <div class="input-row">
        <input
          type="text"
          id="tweet-url"
          class="input"
          placeholder="https://x.com/user/status/..."
          aria-label="URL do post"
        />
        <button id="btn-fetch" class="btn-primary">Buscar</button>
      </div>
    </div>

    <!-- Status -->
    <div id="status" class="status hidden" role="alert" aria-live="polite"></div>

    <!-- Fetched video list (from URL input) -->
    <div id="video-list" class="video-list hidden">
      <div class="section-title">Qualidades disponíveis</div>
      <ul id="quality-list" class="quality-list"></ul>
    </div>

    <!-- Videos detected on current page -->
    <div id="page-videos-section" class="page-section hidden">
      <div class="section-title">
        Vídeos detectados nesta página
        <button id="btn-clear" class="text-btn" title="Limpar lista">Limpar</button>
      </div>
      <ul id="page-video-list" class="quality-list"></ul>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <svg viewBox="0 0 24 24" width="36" height="36" fill="#444" aria-hidden="true">
        <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/>
      </svg>
      <p id="empty-hint">Cole a URL de um post com vídeo<br/>ou navegue por um site suportado</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
